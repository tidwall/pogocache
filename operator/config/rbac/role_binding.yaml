---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pogocache-operator-manager-rolebinding
  labels:
    app.kubernetes.io/name: pogocache-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pogocache-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: pogocache-operator
    namespace: pogocache-system
