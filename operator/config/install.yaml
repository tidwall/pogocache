apiVersion: v1
kind: ServiceAccount
metadata:
  name: pogocache-operator
  namespace: pogocache-system
  labels:
    app.kubernetes.io/name: pogocache-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pogocache-operator-manager-role
  labels:
    app.kubernetes.io/name: pogocache-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
rules:
  # PogoCacheInstance CRD management
  - apiGroups:
      - cache.pogocache.io
    resources:
      - pogocacheinstances
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - cache.pogocache.io
    resources:
      - pogocacheinstances/finalizers
    verbs:
      - update
  - apiGroups:
      - cache.pogocache.io
    resources:
      - pogocacheinstances/status
    verbs:
      - get
      - patch
      - update

  # Deployment management
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Service management
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # PVC management
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # Secret read access (for TLS and auth)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch

  # Event creation for status reporting
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pogocache-operator-manager-rolebinding
  labels:
    app.kubernetes.io/name: pogocache-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pogocache-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: pogocache-operator
    namespace: pogocache-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: pogocache-system
  labels:
    app.kubernetes.io/name: pogocache-operator
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pogocache-operator-controller-manager
  namespace: pogocache-system
  labels:
    app.kubernetes.io/name: pogocache-operator
    app.kubernetes.io/component: controller
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pogocache-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pogocache-operator
        control-plane: controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: pogocache-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: pogocache/pogocache-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
